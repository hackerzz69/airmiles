<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Mile Radius Pro</title>

    <meta name="theme-color" content="#c62828">
    <meta name="description" content="Professional Air Mile Radius Tool for Truck Drivers">

    <link rel="manifest" href="manifest.json">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">

        <!-- Header -->

        <header class="topbar">
            <div>
                <h1>🚛 Air Mile Radius Pro</h1>
                <p>FMCSA Ag Exemption Radius Tool</p>
            </div>
        </header>

        <!-- Controls -->

        <section class="controls">

            <button id="locateBtn" class="primary-btn">
                📍 My Location
            </button>

            <select id="radiusSelect">
                <option value="100">
                    100 Air Miles
                </option>

                <option value="150" selected>
                    150 Air Miles
                </option>

                <option value="172.6">
                    172.6 Statute Miles
                </option>

                <option value="custom">
                    Custom Radius
                </option>
            </select>

            <input
                type="number"
                id="customRadius"
                placeholder="Enter Miles"
                min="1"
                max="1000"
                hidden
            />

        </section>

        <!-- Info Panel -->

        <section class="info-card">

            <div class="info-row">
                <span>Center:</span>
                <span id="centerCoords">Waiting for GPS...</span>
            </div>

            <div class="info-row">
                <span>Radius:</span>
                <span id="radiusDisplay">150 Air Miles</span>
            </div>

            <div class="info-row">
                <span>Distance:</span>
                <span id="distanceDisplay">0 mi</span>
            </div>

        </section>

        <!-- Map -->

        <div id="map"></div>

        <!-- Footer -->

        <footer class="footer">
            Tap anywhere on the map to move the center point.
        </footer>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <script src="app.js"></script>

</body>
</html>
